name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 * * *' # Elke dag om 08:00 UTC
  workflow_dispatch: # Handmatig triggeren via GitHub UI

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "HTTP status: %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/opdrachten?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
